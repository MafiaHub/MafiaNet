name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev cmake build-essential

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DMAFIANET_BUILD_SAMPLES=ON

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DMAFIANET_BUILD_SAMPLES=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DMAFIANET_BUILD_SAMPLES=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run Tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/Samples/Tests/Tests

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: .\build\Samples\Tests\Release\Tests.exe
