name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Linux: Build and test in Docker container (full network access).
  # Tests run through CTest inside the container: one process per test,
  # per-test timeout, and bounded retries for transient timing misses.
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build in Docker
        run: docker build -t mafianet-test .

      - name: Run tests in Docker
        run: |
          mkdir -p test-results
          docker run --rm -v "$PWD/test-results:/results" mafianet-test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: test-results/junit.xml
          if-no-files-found: ignore

  # macOS: Build and run both suites (GoogleTest unit + legacy integration).
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Configure CMake
        run: |
          cmake -B build \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DMAFIANET_BUILD_SAMPLES=ON \
            -DMAFIANET_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --repeat until-pass:3 \
            --timeout 600 \
            --output-junit junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: build/junit.xml
          if-no-files-found: ignore

  # Windows: Build everything, run the hermetic unit suite. The legacy
  # integration suite (loopback networking) is not yet validated on Windows
  # runners, so it stays build-only for now.
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DMAFIANET_BUILD_SAMPLES=ON -DMAFIANET_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run unit tests
        run: |
          ctest --test-dir build -C Release -L unit `
            --output-on-failure `
            --timeout 600 `
            --output-junit junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: build/junit.xml
          if-no-files-found: ignore
