name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Linux: Build and test in Docker container (full network access)
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and test in Docker
        run: |
          docker build -t mafianet-test .
          docker run --rm mafianet-test

  # macOS: Build and run the full test suite
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Configure CMake
        run: |
          cmake -B build \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DMAFIANET_BUILD_SAMPLES=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: ./build/Samples/Tests/Tests

  # Windows: Build only for now — test execution on Windows runners is not yet validated.
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DMAFIANET_BUILD_SAMPLES=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4
