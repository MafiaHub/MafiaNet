name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cmake_flags: -DSLIKENET_ENABLE_SAMPLES=ON
          - os: macos-latest
            cmake_flags: -DSLIKENET_ENABLE_SAMPLES=ON
          - os: windows-latest
            cmake_flags: -DSLIKENET_ENABLE_SAMPLES=ON

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev cmake build-essential

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build ${{ matrix.cmake_flags }}

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build ${{ matrix.cmake_flags }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests (Unix)
        if: runner.os != 'Windows'
        run: ./build/Samples/Tests/Tests
        continue-on-error: true

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: ./build/Samples/Tests/Release/Tests.exe
        continue-on-error: true
